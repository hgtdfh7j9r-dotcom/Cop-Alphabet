<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NATO Phonetic Alphabet — Flashcards</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --card-front: #111;
    --card-back: #1a1a1a;
    --accent: #e8c840;
    --accent2: #4a9eff;
    --text: #f0f0f0;
    --muted: #666;
    --border: #222;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; width: 100%; max-width: 480px; }

  header { text-align: center; margin-bottom: 32px; }

  .badge {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 10px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 4px;
    line-height: 1;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 8px;
  }

  .progress-bar {
    width: 100%;
    height: 2px;
    background: var(--border);
    margin-bottom: 24px;
    border-radius: 1px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  .progress-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }

  .card-scene {
    width: 100%;
    height: 280px;
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 24px;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }

  .card-front { background: var(--card-front); border-color: #2a2a2a; }

  .card-front::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
  }

  .card-back {
    background: var(--card-back);
    transform: rotateY(180deg);
    border-color: var(--accent2);
  }

  .card-back::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent2);
  }

  .card-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .card-letter {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 120px;
    line-height: 1;
    color: var(--accent);
    letter-spacing: 4px;
  }

  .card-tap {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 16px;
    animation: pulse 2s ease-in-out infinite;
  }

  .card-word {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    letter-spacing: 4px;
    color: var(--text);
    line-height: 1;
    text-align: center;
  }

  .card-phonetic {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--accent2);
    margin-top: 12px;
    letter-spacing: 1px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .controls { display: flex; gap: 12px; margin-bottom: 24px; }

  .btn {
    flex: 1;
    padding: 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:active { transform: scale(0.98); }
  .btn-prev::before { content: '← '; }
  .btn-next::after { content: ' →'; }

  .btn-shuffle {
    flex: 0.6;
    border-color: #333;
    color: var(--muted);
    font-size: 10px;
  }
  .btn-shuffle:hover { border-color: var(--accent2); color: var(--accent2); }

  .mode-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    background: #111;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 4px;
  }

  .mode-btn {
    flex: 1;
    padding: 8px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    border-radius: 1px;
    transition: all 0.2s;
  }

  .mode-btn.active { background: var(--accent); color: #000; }

  .import-section {
    border: 1px dashed var(--border);
    border-radius: 4px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .import-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  .import-input {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 10px;
    resize: vertical;
    min-height: 80px;
    border-radius: 2px;
    margin-bottom: 8px;
  }

  .import-input:focus { outline: none; border-color: var(--accent2); }

  .import-hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .btn-import {
    width: 100%;
    padding: 10px;
    background: var(--accent2);
    border: none;
    color: #000;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    border-radius: 2px;
    transition: opacity 0.2s;
  }

  .btn-import:hover { opacity: 0.85; }

  .btn-reset {
    width: 100%;
    padding: 8px;
    background: transparent;
    border: 1px solid #333;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    border-radius: 2px;
    margin-top: 6px;
    transition: all 0.2s;
  }

  .btn-reset:hover { border-color: #e05555; color: #e05555; }

  .score-row { display: flex; gap: 8px; margin-bottom: 24px; }

  .score-box {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px;
    text-align: center;
  }

  .score-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    line-height: 1;
  }

  .score-num.green { color: #4ade80; }
  .score-num.red { color: #f87171; }
  .score-num.yellow { color: var(--accent); }

  .score-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .know-btns { display: flex; gap: 8px; margin-bottom: 16px; }

  .btn-know {
    flex: 1;
    padding: 12px;
    border: 1px solid;
    background: transparent;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .btn-know.yes { border-color: #4ade80; color: #4ade80; }
  .btn-know.yes:hover { background: #4ade8015; }
  .btn-know.no { border-color: #f87171; color: #f87171; }
  .btn-know.no:hover { background: #f8717115; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">Training Tool</div>
    <h1>NATO <span>Alphabet</span></h1>
    <div class="subtitle">Phonetic · Flashcard · Drill</div>
  </header>

  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('nato')">NATO Alpha</button>
    <button class="mode-btn" onclick="setMode('custom')">Custom Cards</button>
  </div>

  <div class="progress-text" id="progressText">Card 1 of 26</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:3.8%"></div></div>

  <div class="card-scene" onclick="flipCard()">
    <div class="card" id="card">
      <div class="card-face card-front">
        <div class="card-label">Letter</div>
        <div class="card-letter" id="cardLetter">A</div>
        <div class="card-tap">tap to reveal</div>
      </div>
      <div class="card-face card-back">
        <div class="card-label">Phonetic Word</div>
        <div class="card-word" id="cardWord">ALPHA</div>
        <div class="card-phonetic" id="cardPhonetic">AL-fah</div>
      </div>
    </div>
  </div>

  <div class="know-btns" id="knowBtns" style="display:none">
    <button class="btn-know no" onclick="markCard(false)">✗ Still Learning</button>
    <button class="btn-know yes" onclick="markCard(true)">✓ Got It</button>
  </div>

  <div class="controls">
    <button class="btn btn-prev" onclick="prevCard()">Prev</button>
    <button class="btn btn-shuffle" onclick="shuffleCards()">Shuffle</button>
    <button class="btn btn-next" onclick="nextCard()">Next</button>
  </div>

  <div class="score-row">
    <div class="score-box">
      <div class="score-num yellow" id="scoreTotal">26</div>
      <div class="score-label">Total</div>
    </div>
    <div class="score-box">
      <div class="score-num green" id="scoreKnow">0</div>
      <div class="score-label">Know It</div>
    </div>
    <div class="score-box">
      <div class="score-num red" id="scoreLearning">0</div>
      <div class="score-label">Learning</div>
    </div>
  </div>

  <div class="import-section" id="importSection" style="display:none">
    <span class="import-label">Import Custom Flashcards</span>
    <div class="import-hint">Format: FRONT | BACK — one card per line</div>
    <textarea class="import-input" id="importInput" placeholder="Alpha | NATO letter for A&#10;Bravo | NATO letter for B"></textarea>
    <button class="btn-import" onclick="importCards()">Load Cards</button>
    <button class="btn-reset" onclick="resetToNATO()">Reset to NATO Alphabet</button>
  </div>
</div>

<script>
const NATO = [
  { front: 'A', back: 'ALPHA', phonetic: 'AL-fah' },
  { front: 'B', back: 'BRAVO', phonetic: 'BRAH-voh' },
  { front: 'C', back: 'CHARLIE', phonetic: 'CHAR-lee' },
  { front: 'D', back: 'DELTA', phonetic: 'DELL-tah' },
  { front: 'E', back: 'ECHO', phonetic: 'ECK-oh' },
  { front: 'F', back: 'FOXTROT', phonetic: 'FOKS-trot' },
  { front: 'G', back: 'GOLF', phonetic: 'GOLF' },
  { front: 'H', back: 'HOTEL', phonetic: 'hoh-TEL' },
  { front: 'I', back: 'INDIA', phonetic: 'IN-dee-ah' },
  { front: 'J', back: 'JULIET', phonetic: 'JEW-lee-et' },
  { front: 'K', back: 'KILO', phonetic: 'KEY-loh' },
  { front: 'L', back: 'LIMA', phonetic: 'LEE-mah' },
  { front: 'M', back: 'MIKE', phonetic: 'MIKE' },
  { front: 'N', back: 'NOVEMBER', phonetic: 'no-VEM-ber' },
  { front: 'O', back: 'OSCAR', phonetic: 'OSS-car' },
  { front: 'P', back: 'PAPA', phonetic: 'pah-PAH' },
  { front: 'Q', back: 'QUEBEC', phonetic: 'keh-BECK' },
  { front: 'R', back: 'ROMEO', phonetic: 'ROW-me-oh' },
  { front: 'S', back: 'SIERRA', phonetic: 'see-AIR-ah' },
  { front: 'T', back: 'TANGO', phonetic: 'TANG-go' },
  { front: 'U', back: 'UNIFORM', phonetic: 'YOU-nee-form' },
  { front: 'V', back: 'VICTOR', phonetic: 'VIK-tah' },
  { front: 'W', back: 'WHISKEY', phonetic: 'WISS-key' },
  { front: 'X', back: 'X-RAY', phonetic: 'ECKS-ray' },
  { front: 'Y', back: 'YANKEE', phonetic: 'YANG-kee' },
  { front: 'Z', back: 'ZULU', phonetic: 'ZOO-loo' },
];

let cards = [...NATO];
let current = 0;
let isFlipped = false;
let mode = 'nato';
let scores = {};

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&m==='nato')||(i===1&&m==='custom')));
  document.getElementById('importSection').style.display = m === 'custom' ? 'block' : 'none';
  if (m === 'nato') resetToNATO();
}

function resetToNATO() {
  cards = [...NATO];
  current = 0;
  scores = {};
  isFlipped = false;
  updateCard();
  updateScore();
}

function updateCard() {
  const c = cards[current];
  document.getElementById('cardLetter').textContent = c.front;
  document.getElementById('cardWord').textContent = c.back;
  document.getElementById('cardPhonetic').textContent = c.phonetic || '';
  document.getElementById('cardPhonetic').style.display = c.phonetic ? 'block' : 'none';
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('knowBtns').style.display = 'none';
  const pct = ((current + 1) / cards.length * 100).toFixed(1);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Card ${current + 1} of ${cards.length}`;
  document.getElementById('scoreTotal').textContent = cards.length;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
  if (isFlipped) document.getElementById('knowBtns').style.display = 'flex';
}

function nextCard() {
  current = (current + 1) % cards.length;
  updateCard();
}

function prevCard() {
  current = (current - 1 + cards.length) % cards.length;
  updateCard();
}

function shuffleCards() {
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  current = 0;
  scores = {};
  updateCard();
  updateScore();
}

function markCard(know) {
  const key = cards[current].front;
  scores[key] = know;
  updateScore();
  setTimeout(nextCard, 300);
}

function updateScore() {
  const vals = Object.values(scores);
  document.getElementById('scoreKnow').textContent = vals.filter(v => v).length;
  document.getElementById('scoreLearning').textContent = vals.filter(v => !v).length;
}

function importCards() {
  const raw = document.getElementById('importInput').value.trim();
  if (!raw) return;
  const parsed = raw.split('\n').filter(l => l.trim()).map(l => {
    const parts = l.split('|').map(p => p.trim());
    return { front: parts[0] || '', back: parts[1] || '', phonetic: parts[2] || '' };
  }).filter(c => c.front && c.back);
  if (!parsed.length) return alert('No valid cards found. Use: FRONT | BACK format.');
  cards = parsed;
  current = 0;
  scores = {};
  updateCard();
  updateScore();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'l') nextCard();
  if (e.key === 'ArrowLeft' || e.key === 'h') prevCard();
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'y' && isFlipped) markCard(true);
  if (e.key === 'n' && isFlipped) markCard(false);
});

updateCard();
</script>
</body>
</html>
